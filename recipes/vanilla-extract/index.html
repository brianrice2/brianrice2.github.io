    <h1> Vanilla Extract </h1>
     
    </header>
    <main> <h2 id="ingredients">Ingredients</h2>
<ul>
<li>1 oz (5-6 count) vanilla beans, cut lengthwise</li>
<li>1 cup vodka, 80-100 proof</li>
</ul>
<h2 id="preparation">Preparation</h2>
<p>Combine in a jar. Seal and store in a cool, dark place for 3-6 months, shaking the jar every few weeks.</p>
